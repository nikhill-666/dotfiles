# Application bindings
$terminal = uwsm app -- $TERMINAL
$browser = zen-browser

bind = SUPER, RETURN, exec, ghostty
bind = SUPER SHIFT, B, exec, firefox
bind = SUPER SHIFT, P, exec, firefox --private-window
bind = SUPER, B, exec, zen-browser
bind = SUPER, A, exec, aether-fixed
bind = SUPER, Q, killactive
bind = SUPER, L, exec, hyprlock
bind = SUPER CONTROL, L, exec, ~/.local/bin/sddm-lock
bind = SUPER SHIFT, W, exec, ~/.config/hypr/scripts/swww-wallpaper.sh
bind = SUPER ALT, W, exec, notify-send "MPV Toggle" "Keybind pressed" && ~/.config/hypr/scripts/mpvpaper-toggle.sh
bind = SUPER, W, exec, gazelle
bind = SUPER CONTROL, W, exec, ~/.config/waybar/scripts/waybar-switch.sh toggle
bind = SUPER, SPACE, exec, walker
bind = SUPER ALT, SPACE, exec, wofi --show drun --sort-order alphabetical --prompt "Search"
bind = SUPER, C, exec, wofi --show clipboard
bind = SUPER, T, togglefloating
bind = SUPER, F, fullscreen, 0
bind = SUPER, K, exec, ~/.config/hypr/scripts/toggle-window-layout.sh
bind = SUPER, PRINT, exec, grim -g "$(slurp)" - | wl-copy

# Workspace switching

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# --- Native Scratchpad Toggles ---
# Ensure these don't conflict with the 'bindd' lines above
bind = SUPER SHIFT, SPACE, exec, ~/.config/hypr/scripts/toggle-waybar.sh


#Extra control binds for rezizing Iand mouse control
# Resize Width (Length) - SHIFT + CTRL + Plus/Minus
binde = SHIFT CONTROL, equal, resizeactive, 30 0
binde = SHIFT CONTROL, minus, resizeactive, -30 0

# Resize Height - CTRL + Plus/Minus
binde = CONTROL, equal, resizeactive, 0 30
binde = CONTROL, minus, resizeactive, 0 -30

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Media keys
bind = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume-control.sh up
bind = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume-control.sh down
bind = , XF86AudioMute, exec, ~/.config/hypr/scripts/volume-control.sh mute
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Brightness keys
bind = , XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness-control.sh up
bind = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness-control.sh down
bind = SUPER, v, exec, wofi-vwallpaper
