# Web Apps Window Rules - Omarchy Style
# Configure frameless web app behavior

# Browser type identification for web apps
windowrule = tag +chromium-based-browser, match:class ((google-)?[cC]hrom(e|ium)|[bB]rave-browser|[mM]icrosoft-edge|[vV]ivaldi|[oO]pera)
windowrule = tag +firefox-based-browser, match:class ([fF]irefox|[zZ]en-browser|[lL]ibrewolf|[zZ]en)

# Force chromium-based browsers into tile to deal with --app bug
windowrule = tile on, match:tag chromium-based-browser

# Web app opacity settings (except video sites)
windowrule = opacity 1 0.97, match:tag chromium-based-browser
windowrule = opacity 1.0 1.0, match:initial_title ((?i)(?:[a-z0-9-]+\.)*youtube\.com_/|app\.zoom\.us_/wc/home|.*\.twitch\.tv)

# Web app floating behavior
windowrule = float on, match:tag webapp-float
windowrule = center on, match:tag webapp-float
windowrule = size 875 600, match:tag webapp-float

# Web app fullscreen behavior
windowrule = fullscreen, match:tag webapp-fullscreen

# Special handling for specific web apps
windowrule = float on, match:class WhatsApp
windowrule = size 800 600, match:class WhatsApp
windowrule = center on, match:class WhatsApp

windowrule = float on, match:class Discord
windowrule = size 1280 720, match:class Discord
windowrule = center on, match:class Discord

# Web app workspace rules
windowrule = workspace special:webapps, match:tag webapp-special
windowrule = tile on, match:tag webapp-special

# Prevent web apps from stealing focus
windowrulev2 = nofocus, class:^(chromium-browser)$, title:^(.* is sharing your screen.*)$
windowrulev2 = noinitialfocus, class:^(chromium-browser)$, title:^(.* is sharing your screen.*)$

# Web app size constraints
windowrule = minsize 400 300, match:tag chromium-based-browser
windowrule = maxsize 2560 1440, match:tag chromium-based-browser